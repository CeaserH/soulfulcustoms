<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vallejo Tech - Computer Repair Services</title>

  <!-- Tailwind CSS CDN (OK for development; we can move to build-time later) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    :root { font-family: 'Inter', sans-serif; }
    body { background-color: #050505; }
  </style>

  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛠️</text></svg>">
</head>

<body>
  <div id="root"></div>

  <script>
  (function () {
    var path = sessionStorage.getItem("spa:path");
    if (path) {
      var search = sessionStorage.getItem("spa:search") || "";
      var hash = sessionStorage.getItem("spa:hash") || "";
      sessionStorage.removeItem("spa:path");
      sessionStorage.removeItem("spa:search");
      sessionStorage.removeItem("spa:hash");
      history.replaceState(null, "", path + search + hash);
    }
  })();
</script>


  <!-- Parcel entry -->
  <script type="module" src="./src/main.jsx"></script>
</body>
</html>
