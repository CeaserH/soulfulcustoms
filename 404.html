<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting…</title>
    <script>
      (function () {
        var path = window.location.pathname;
        sessionStorage.setItem("spa:path", path);
        sessionStorage.setItem("spa:search", window.location.search);
        sessionStorage.setItem("spa:hash", window.location.hash);
        window.location.replace("/");
      })();
    </script>
  </head>
  <body></body>
</html>
